<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TRINITY Coordinator</title>
  <desc id="desc">A hexagonal logo for the TRINITY multi-agent coordinator</desc>
  <defs>
    <linearGradient id="hex-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="35%" stop-color="#1d4ed8"/>
      <stop offset="65%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="core-glow" cx="50%" cy="44%" r="65%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="neo-glow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="hex-clip">
      <polygon points="100,12 178,54 178,146 100,188 22,146 22,54"/>
    </clipPath>
    <pattern id="mesh" width="28" height="28" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
      <path d="M0 14 L28 14" stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>
      <path d="M14 0 L14 28" stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>
    </pattern>
  </defs>

  <g transform="translate(0 0)">
    <polygon
      points="100,12 178,54 178,146 100,188 22,146 22,54"
      fill="url(#hex-gradient)"
      filter="url(#neo-glow)"
      opacity="0.95"
    />

    <polygon
      points="100,18 172,56 172,144 100,182 28,144 28,56"
      fill="rgba(7, 15, 29, 0.82)"
      stroke="rgba(125, 211, 252, 0.45)"
      stroke-width="1.2"
    />

    <g clip-path="url(#hex-clip)">
      <rect x="0" y="0" width="200" height="200" fill="url(#core-glow)"/>
      <rect x="0" y="0" width="200" height="200" fill="url(#mesh)" opacity="0.22"/>

      <g opacity="0.95" transform="translate(16 16)">
        <circle cx="84" cy="84" r="50" fill="none" stroke="url(#accent-stroke)" stroke-width="2.1" opacity="0.7"/>
        <circle cx="84" cy="84" r="34" fill="none" stroke="#67e8f9" stroke-width="1.8" stroke-opacity="0.55"/>

        <path
          d="M84 34 C96 48 96 80 84 94 L84 140"
          fill="none" stroke="#22d3ee" stroke-width="2.2" stroke-linecap="round" opacity="0.95"/>
        <path
          d="M84 34 C120 48 120 80 84 94"
          fill="none" stroke="#a78bfa" stroke-width="2.0" stroke-linecap="round" opacity="0.85"/>
        <path
          d="M84 140 C50 126 50 94 84 80"
          fill="none" stroke="#67e8f9" stroke-width="2.1" stroke-linecap="round" opacity="0.8"/>

        <circle cx="84" cy="34" r="4.5" fill="#f0f9ff"/>
        <circle cx="84" cy="140" r="4.5" fill="#c4b5fd"/>
        <circle cx="120" cy="48" r="3.8" fill="#7dd3fc"/>
        <circle cx="48" cy="94" r="3.4" fill="#5eead4"/>
        <circle cx="84" cy="80" r="3.2" fill="#bfdbfe"/>
      </g>

      <g transform="translate(34 34)">
        <path
          d="M18 40 L42 26 L66 40 L66 69 L42 83 L18 69 Z"
          fill="none" stroke="#c4b5fd" stroke-width="1.6" stroke-linejoin="round" opacity="0.45"/>
        <g fill="none" stroke="#7dd3fc" stroke-opacity="0.9" stroke-width="1.4">
          <line x1="26" y1="48" x2="58" y2="48"/>
          <line x1="26" y1="62" x2="58" y2="62"/>
          <line x1="42" y1="34" x2="42" y2="73"/>
        </g>
      </g>
    </g>

    <text x="100" y="182" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#e0f2fe" letter-spacing="1.5">
      TRINITY
    </text>
  </g>
</svg>
